<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#11998e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tools Scan">
    
    <title>Tools Scan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Ícone embutido - Engrenagem -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2311998e'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E⚙️%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2311998e'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E⚙️%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div id="login-screen" class="screen">
        <h2>⚙️ Tools Scan</h2>
        <input type="text" id="matricula" placeholder="Digite sua matrícula">
        <button id="login-btn">Entrar com Matrícula</button>
        <button id="scan-badge-btn">Ler QR Code do Crachá</button>
    </div>

    <div id="main-screen" class="screen" style="display:none;">
        <div id="operator-info" class="operator-info"></div>
        
        <!-- Status de conexão -->
        <div id="connection-status" class="connection-status online">
            📡 Online
        </div>
        
        <!-- Pendências -->
        <div id="pending-badge" style="display:none;" class="pending-badge">
            📦 X movimentações pendentes
        </div>
        
        <div class="card">
            <button id="scan-part-btn" class="primary-btn">Escanear QR Code</button>
            
            <div style="text-align: center; margin: 15px 0; color: #999;">ou</div>
            
            <label>Buscar por código da peça:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="manual-part-code" placeholder="Ex: P001, BROCA01" style="flex:1;">
                <button id="manual-search-btn" style="width: auto; padding: 12px 20px;">Buscar</button>
            </div>
            <div style="font-size: 12px; color: #666; margin-top: 5px;">
                O código está impresso na OS junto com o QR Code
            </div>
        </div>
        
        <div id="part-info" class="card" style="display:none;">
            <h3>Informações da Peça</h3>
            <p><strong>Peça:</strong> <span id="part-name"></span></p>
            <p><strong>Sonda:</strong> <span id="part-sonda"></span></p>
            <p><strong>Localização atual:</strong> <span id="current-location"></span></p>
            
            <form id="movement-form">
                <label>De (local atual):</label>
                <input type="text" id="from-location" readonly>
                
                <label>Para:</label>
                <select id="to-location">
                    <option value="Praça N1">Praça N1</option>
                    <option value="Praça N2">Praça N2</option>
                    <option value="Praça N3">Praça N3</option>
                    <option value="Praça N4">Praça N4</option>
                    <option value="Praça N5">Praça N5</option>
                    <option value="Praça N6">Praça N6</option>
                    <option value="Praça N7">Praça N7</option>
                    <option value="Praça N8">Praça N8</option>
                    <option value="Praça N9">Praça N9</option>
                    <option value="Praça N10">Praça N10</option>
                    <option value="Oficina">Oficina</option>
                    <option value="Estoque">Estoque</option>
                </select>
                
                <label>Status:</label>
                <select id="status">
                    <option value="Operando">Operando</option>
                    <option value="Parada">Parada</option>
                </select>
                
                <label>Observações:</label>
                <textarea id="notes" rows="3" placeholder="Ex: Quebrou rosca, necessidade de manutenção..."></textarea>
                
                <button type="submit" class="confirm-btn" id="submit-btn">Confirmar Movimentação</button>
            </form>
        </div>
        
        <!-- Sessão de pendências -->
        <div id="pending-section" style="display:none;" class="card">
            <h3>Movimentações Pendentes</h3>
            <div id="pending-list"></div>
            <button id="sync-now-btn" style="background: #28a745;">Sincronizar Agora</button>
        </div>
    </div>

    <!-- Tela da câmera -->
    <div id="camera-screen" style="display:none;">
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div class="camera-controls">
            <div id="scan-message">Iniciando câmera...</div>
            <button id="close-camera-btn">Fechar Câmera</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast">Mensagem</div>
    
    <!-- Loading spinner -->
    <div id="loading" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Processando...</div>
    </div>

    <!-- Banner de instalação do PWA -->
    <div id="install-banner" style="display:none;">
        <p>Instale este app no seu celular!</p>
        <button id="install-btn">Instalar</button>
        <button id="close-install-btn">Fechar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => console.log('Service Worker registrado'))
                .catch(error => console.error('Service Worker:', error));
        }
        
        // PWA Installation
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });
        
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('install-banner').style.display = 'none';
            }
        });
        
        document.getElementById('close-install-btn').addEventListener('click', () => {
            document.getElementById('install-banner').style.display = 'none';
        });
        
        // Status de conexão
        function updateConnectionStatus() {
            const statusDiv = document.getElementById('connection-status');
            if (navigator.onLine) {
                statusDiv.textContent = 'Online';
                statusDiv.className = 'connection-status online';
            } else {
                statusDiv.textContent = 'Offline - Dados salvos localmente';
                statusDiv.className = 'connection-status offline';
            }
        }
        
        window.addEventListener('online', () => {
            updateConnectionStatus();
            showToast('Conexão restaurada. Sincronizando dados...', 'info');
            if (window.syncPendingMovements) window.syncPendingMovements();
        });
        
        window.addEventListener('offline', () => {
            updateConnectionStatus();
            showToast('Sem conexão. Os dados serão salvos localmente.', 'warning');
        });
        
        updateConnectionStatus();
    </script>
</body>
</html>
